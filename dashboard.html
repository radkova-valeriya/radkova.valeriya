<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Личный кабинет | Валерия Радкова</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #faf8f5; color: #1a1a2e; }
        .container { max-width: 1000px; margin: 40px auto; padding: 24px; }
        .card { background: white; border-radius: 28px; padding: 32px; margin-bottom: 32px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        h2 { font-size: 1.5rem; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; margin: 20px 0; }
        .field { background: #faf8f5; padding: 16px; border-radius: 20px; text-align: center; }
        .field label { display: block; font-size: 0.8rem; color: #999; margin-bottom: 8px; }
        .field input { width: 100%; padding: 12px; border: 1px solid #e0d6c8; border-radius: 40px; text-align: center; font-size: 1rem; }
        .goal-group { display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0; }
        .goal-btn { background: #f0ede8; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
        .goal-btn.active { background: #1a1a2e; color: white; }
        .btn { background: #1a1a2e; color: white; padding: 12px 28px; border: none; border-radius: 40px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; font-family: 'Inter', sans-serif; margin-top: 10px; }
        .btn-outline { background: transparent; border: 1.5px solid #1a1a2e; color: #1a1a2e; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-family: 'Inter', sans-serif; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin: 24px 0; }
        .menu-card { background: #faf8f5; border-radius: 24px; padding: 20px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .menu-card.selected { border-color: #4a7c59; background: #f0f5f0; }
        .menu-card h4 { margin-bottom: 8px; }
        .menu-desc { font-size: 0.8rem; color: #c4a87c; margin-bottom: 16px; }
        .meal-preview p { font-size: 0.85rem; color: #666; margin: 6px 0; }
        .meal-detail { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin: 20px 0; }
        .meal-item { background: white; padding: 16px; border-radius: 20px; }
        .recipe-link { margin-top: 10px; font-size: 0.8rem; color: #c4a87c; display: inline-block; text-decoration: none; }
        .back-link { display: inline-block; margin-bottom: 24px; color: #1a1a2e; text-decoration: none; font-weight: 500; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #faf8f5; }
        @media (max-width: 600px) { .container { margin: 20px auto; padding: 16px; } .card { padding: 24px; } }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>

    <div id="authBlock" style="text-align:center; padding:40px;">
        <p>🔐 Пожалуйста, <a href="index.html" style="color:#1a1a2e;">войдите или зарегистрируйтесь</a> на главной странице</p>
    </div>

    <div id="dashboardContent" style="display:none;">

        <!-- Параметры -->
        <div class="card">
            <h2>📏 Мои параметры</h2>
            <div class="grid">
                <div class="field"><label>Вес (кг)</label><input type="number" id="weight" step="0.1" placeholder="55.5"></div>
                <div class="field"><label>Рост (см)</label><input type="number" id="height" step="1" placeholder="165"></div>
                <div class="field"><label>Возраст</label><input type="number" id="age" step="1" placeholder="30"></div>
            </div>
            <div class="goal-group">
                <button class="goal-btn" data-goal="loss">🔥 Похудение</button>
                <button class="goal-btn active" data-goal="maintain">⚖️ Поддержание</button>
                <button class="goal-btn" data-goal="gain">💪 Набор массы</button>
            </div>
            <button id="saveParamsBtn" class="btn"><i class="fas fa-save"></i> Сохранить параметры</button>
        </div>

        <!-- Ферритин -->
        <div class="card">
            <h2>🩸 Уровень ферритина</h2>
            <div class="field"><label>Ферритин (нг/мл):</label><input type="number" id="ferritin" step="1" placeholder="например, 25"></div>
            <button id="saveFerritinBtn" class="btn"><i class="fas fa-database"></i> Сохранить ферритин</button>
        </div>

        <!-- Меню -->
        <div class="card" id="menuBlock" style="display:none;">
            <h2>🍽️ Меню на сегодня</h2>
            <p id="menuInfo" style="margin-bottom: 16px;"></p>
            <div id="menuOptions" class="menu-grid"></div>
            <div id="selectedMenuBlock" style="display:none; margin-top: 32px; padding: 24px; background: #e8f0e8; border-radius: 24px;">
                <h3>✅ Вы выбрали меню:</h3>
                <div id="selectedMenuDetails"></div>
                <button id="saveMenuBtn" class="btn"><i class="fas fa-heart"></i> Сохранить в мою кулинарную книгу</button>
            </div>
        </div>

        <!-- История -->
        <div class="card">
            <h2>📊 История замеров</h2>
            <div id="historyTable"></div>
        </div>

        <!-- Напоминания -->
        <div class="card">
            <h2>🔔 Напоминания</h2>
            <button id="notifyBtn" class="btn-outline"><i class="fas fa-bell"></i> Включить уведомления</button>
        </div>
    </div>
</div>

<script>
    // -------------------- ПРОСТАЯ БАЗА МЕНЮ --------------------
    const menusDB = {
        low: {
            1200: { range: "1200–1300", menus: [
                { id: "low_1200_1", title: "🩸 Восстанавливающее меню, день 1", desc: "Насыщено железом", meals: { breakfast: "Омлет из 2 яиц + 50 г говядины + шпинат + перец", lunch: "120 г гречки + 100 г печени + салат из капусты", dinner: "130 г скумбрии + 200 г цветной капусты", snack: "150 мл кефира" } },
                { id: "low_1200_2", title: "🩸 Восстанавливающее меню, день 2", desc: "Чечевица и печень", meals: { breakfast: "2 яйца пашот + 100 г говядины + руккола", lunch: "150 г чечевичного супа + 100 г курицы", dinner: "150 г куриной печени + 200 г брокколи", snack: "1 яблоко" } }
            ] },
            1350: { range: "1300–1400", menus: [
                { id: "low_1350_1", title: "🩸 Энергия + железо, день 1", desc: "+ яйцо и овощи", meals: { breakfast: "Омлет из 2 яиц + 70 г говядины + шпинат", lunch: "150 г гречки + 120 г печени + капуста", dinner: "170 г скумбрии + 200 г цветной капусты", snack: "150 мл кефира + ягоды" } },
                { id: "low_1350_2", title: "🩸 Энергия + железо, день 2", desc: "С апельсином", meals: { breakfast: "2 яйца пашот + 120 г говядины + руккола", lunch: "170 г чечевичного супа + 120 г курицы", dinner: "170 г куриной печени + 200 г брокколи", snack: "1 апельсин + орехи" } }
            ] },
            1450: { range: "1400–1500", menus: [
                { id: "low_1450_1", title: "🩸 Плюс творог, день 1", desc: "+ творог", meals: { breakfast: "Омлет + 70 г говядины + шпинат", lunch: "170 г гречки + 120 г печени + капуста", dinner: "170 г скумбрии + 200 г цветной капусты", snack: "150 мл кефира + черника" } },
                { id: "low_1450_2", title: "🩸 Плюс творог, день 2", desc: "Творог на завтрак", meals: { breakfast: "150 г творога + черника + орехи", lunch: "170 г гречки + 150 г языка + капуста", dinner: "170 г скумбрии + 200 г фасоли", snack: "1 апельсин + миндаль" } }
            ] },
            1550: { range: "1500–1600", menus: [
                { id: "low_1550_1", title: "🩸 Максимум белка, день 1", desc: "3 яйца", meals: { breakfast: "Омлет из 3 яиц + 80 г говядины", lunch: "180 г гречки + 150 г печени + капуста", dinner: "180 г скумбрии + 220 г цветной капусты", snack: "200 мл кефира + черника" } },
                { id: "low_1550_2", title: "🩸 Максимум белка, день 2", desc: "С фруктами", meals: { breakfast: "2 яйца пашот + 150 г говядины", lunch: "180 г чечевичного супа + 150 г курицы", dinner: "180 г куриной печени + 220 г брокколи", snack: "1 яблоко + 1 апельсин + орехи" } }
            ] },
            1650: { range: "1600–1700", menus: [
                { id: "low_1650_1", title: "🩸 Усиленное меню, день 1", desc: "2 тоста", meals: { breakfast: "Омлет + 100 г говядины + шпинат + тост", lunch: "200 г гречки + 180 г печени + капуста", dinner: "200 г скумбрии + 250 г цветной капусты", snack: "200 мл кефира + черника + орехи" } },
                { id: "low_1650_2", title: "🩸 Усиленное меню, день 2", desc: "С грушей", meals: { breakfast: "200 г творога + черника + орехи", lunch: "200 г гречки + 200 г языка + капуста", dinner: "200 г скумбрии + 250 г фасоли", snack: "1 апельсин + 1 киви + орехи" } }
            ] },
            1750: { range: "1700–1800", menus: [
                { id: "low_1750_1", title: "🩸 Интенсивное, день 1", desc: "Максимум овощей", meals: { breakfast: "Омлет + 120 г говядины + шпинат + тост", lunch: "220 г гречки + 200 г печени + капуста", dinner: "220 г скумбрии + 300 г цветной капусты", snack: "200 мл кефира + черника + яблоко" } },
                { id: "low_1750_2", title: "🩸 Интенсивное, день 2", desc: "Двойной перекус", meals: { breakfast: "2 яйца пашот + 200 г говядины", lunch: "220 г чечевичного супа + 200 г курицы", dinner: "220 г куриной печени + 300 г брокколи", snack: "яблоко + апельсин + груша + орехи" } }
            ] },
            1850: { range: "1800–1900", menus: [
                { id: "low_1850_1", title: "🩸 Высокая активность, день 1", desc: "4 яйца", meals: { breakfast: "Омлет из 4 яиц + 150 г говядины", lunch: "250 г гречки + 220 г печени + капуста", dinner: "250 г скумбрии + 350 г цветной капусты", snack: "250 мл кефира + черника + яблоко" } },
                { id: "low_1850_2", title: "🩸 Высокая активность, день 2", desc: "С бананом", meals: { breakfast: "250 г творога + черника + орехи", lunch: "250 г гречки + 250 г языка + капуста", dinner: "250 г скумбрии + 350 г фасоли", snack: "апельсин + банан + орехи" } }
            ] },
            1950: { range: "1900–2000", menus: [
                { id: "low_1950_1", title: "🩸 Максимальная порция, день 1", desc: "Сытное", meals: { breakfast: "Омлет из 4 яиц + 180 г говядины", lunch: "280 г гречки + 250 г печени + капуста", dinner: "280 г скумбрии + 400 г цветной капусты", snack: "250 мл кефира + черника + яблоко + груша" } },
                { id: "low_1950_2", title: "🩸 Максимальная порция, день 2", desc: "Суп-пюре", meals: { breakfast: "2 яйца пашот + 280 г говядины", lunch: "280 г чечевичного супа + 280 г курицы", dinner: "280 г куриной печени + 400 г брокколи", snack: "яблоко + апельсин + груша + банан + орехи" } }
            ] }
        },
        normal: {
            1550: { range: "1500–1600", menus: [{ id: "norm_1550", title: "🌿 Базовое меню", desc: "Сбалансированное", meals: { breakfast: "Овсянка + 2 яйца", lunch: "Гречка с курицей + овощи", dinner: "Рыба на пару + салат", snack: "Кефир" } }] }
        }
    };

    let currentGoal = "maintain";
    let selectedMenu = null;

    function getFerritinStatus(val) {
        if (val === "" || val === null) return null;
        if (val < 50) return "low";
        if (val <= 150) return "normal";
        return "high";
    }

    function getTargetCalories(weight, height, age, goal) {
        let bmr = 10 * weight + 6.25 * height - 5 * age - 161;
        let tdee = bmr * 1.375;
        if (goal === "loss") return Math.round(tdee * 0.85);
        if (goal === "gain") return Math.round(tdee * 1.1);
        return Math.round(tdee);
    }

    function findNearestRange(cal) {
        const ranges = [1200, 1350, 1450, 1550, 1650, 1750, 1850, 1950];
        return ranges.reduce((a, b) => Math.abs(b - cal) < Math.abs(a - cal) ? b : a);
    }

    function renderMenus() {
        let weight = parseFloat(document.getElementById('weight').value);
        let height = parseFloat(document.getElementById('height').value);
        let age = parseFloat(document.getElementById('age').value);
        if (!weight || !height || !age) {
            alert("Заполните вес, рост и возраст в разделе «Мои параметры»");
            return;
        }
        let calories = getTargetCalories(weight, height, age, currentGoal);
        let range = findNearestRange(calories);
        let ferritinVal = document.getElementById('ferritin').value ? parseFloat(document.getElementById('ferritin').value) : null;
        let ferritinStatus = getFerritinStatus(ferritinVal) || "normal";
        let menuData = (ferritinStatus === "low" ? menusDB.low[range] : menusDB.normal[range]) || menusDB.low[1550];
        if (!menuData) menuData = menusDB.low[1550];

        document.getElementById('menuInfo').innerHTML = `${menuData.range} ккал · ферритин: ${ferritinStatus === "low" ? "низкий" : "норма"} · цель: ${currentGoal === "loss" ? "похудение" : (currentGoal === "gain" ? "набор" : "поддержание")}`;
        let container = document.getElementById('menuOptions');
        container.innerHTML = menuData.menus.map(m => `
            <div class="menu-card" data-menu='${JSON.stringify(m)}'>
                <h4>${m.title}</h4>
                <div class="menu-desc">${m.desc}</div>
                <div class="meal-preview">
                    <p>🌅 ${m.meals.breakfast.substring(0, 50)}…</p>
                    <p>☀️ ${m.meals.lunch.substring(0, 50)}…</p>
                    <p>🌙 ${m.meals.dinner.substring(0, 50)}…</p>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.menu-card').forEach(card => {
            card.onclick = () => {
                document.querySelectorAll('.menu-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedMenu = JSON.parse(card.dataset.menu);
                displaySelectedMenu(selectedMenu);
            };
        });
        document.getElementById('menuBlock').style.display = 'block';
    }

    function displaySelectedMenu(menu) {
        document.getElementById('selectedMenuDetails').innerHTML = `
            <div class="meal-detail">
                <div class="meal-item"><h5>🌅 Завтрак</h5><p>${menu.meals.breakfast}</p><a class="recipe-link" href="https://eda.ru/recepty?q=${encodeURIComponent(menu.meals.breakfast.split('+')[0])}" target="_blank">Найти рецепт →</a></div>
                <div class="meal-item"><h5>☀️ Обед</h5><p>${menu.meals.lunch}</p><a class="recipe-link" href="https://eda.ru/recepty?q=${encodeURIComponent(menu.meals.lunch.split('+')[0])}" target="_blank">Найти рецепт →</a></div>
                <div class="meal-item"><h5>🌙 Ужин</h5><p>${menu.meals.dinner}</p><a class="recipe-link" href="https://eda.ru/recepty?q=${encodeURIComponent(menu.meals.dinner.split('+')[0])}" target="_blank">Найти рецепт →</a></div>
                <div class="meal-item"><h5>🍎 Перекус</h5><p>${menu.meals.snack}</p><a class="recipe-link" href="https://eda.ru/recepty?q=${encodeURIComponent(menu.meals.snack.split(',')[0])}" target="_blank">Найти рецепт →</a></div>
            </div>
        `;
        document.getElementById('selectedMenuBlock').style.display = 'block';
    }

    function saveParams() {
        let weight = document.getElementById('weight').value;
        let height = document.getElementById('height').value;
        let age = document.getElementById('age').value;
        let measurements = JSON.parse(localStorage.getItem('user_measurements') || '[]');
        measurements.push({ date: new Date().toISOString(), weight, height, age, goal: currentGoal });
        localStorage.setItem('user_measurements', JSON.stringify(measurements));
        renderHistory();
        renderMenus();
        alert("Параметры сохранены");
    }

    function renderHistory() {
        let history = JSON.parse(localStorage.getItem('user_measurements') || '[]');
        let container = document.getElementById('historyTable');
        if (history.length === 0) { container.innerHTML = "<p>Нет сохранённых замеров</p>"; return; }
        let html = '<table><thead><tr><th>Дата</th><th>Вес</th><th>Рост</th><th>Возраст</th><th>Цель</th></tr></thead><tbody>';
        history.slice().reverse().forEach(h => {
            html += `<tr><td>${new Date(h.date).toLocaleDateString()}</td><td>${h.weight || "-"} кг</td><td>${h.height || "-"} см</td><td>${h.age || "-"}</td><td>${h.goal === "loss" ? "похудение" : (h.goal === "gain" ? "набор" : "поддержание")}</td></tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function saveMenuToLocal() {
        if (!selectedMenu) { alert("Сначала выберите меню"); return; }
        let saved = JSON.parse(localStorage.getItem('saved_menus') || '[]');
        if (saved.some(m => m.id === selectedMenu.id)) { alert("Это меню уже сохранено"); return; }
        saved.push({ ...selectedMenu, savedAt: new Date().toISOString() });
        localStorage.setItem('saved_menus', JSON.stringify(saved));
        alert("Меню сохранено в вашу кулинарную книгу!");
    }

    // ----- Привязка кнопок -----
    document.getElementById('saveParamsBtn').onclick = saveParams;
    document.getElementById('saveFerritinBtn').onclick = () => renderMenus();
    document.getElementById('saveMenuBtn').onclick = saveMenuToLocal;
    document.getElementById('notifyBtn').onclick = () => {
        if (Notification.permission !== 'granted') Notification.requestPermission().then(p => { if (p === 'granted') alert("Уведомления включены"); });
        else alert("Уведомления уже разрешены");
    };
    document.querySelectorAll('.goal-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.goal-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentGoal = btn.dataset.goal;
            saveParams();
        };
    });

    // ---------- УПРОЩЁННАЯ ПРОВЕРКА ВХОДА (без Firebase) ----------
    // Для демонстрации просто показываем контент
    document.getElementById('authBlock').style.display = 'none';
    document.getElementById('dashboardContent').style.display = 'block';
    renderHistory();
    if (document.getElementById('weight').value && document.getElementById('height').value && document.getElementById('age').value) {
        renderMenus();
    }
</script>
</body>
</html>
