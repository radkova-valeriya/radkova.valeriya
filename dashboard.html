<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Личный кабинет | Валерия Радкова</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #faf8f5; color: #1a1a2e; }
        .container { max-width: 1000px; margin: 40px auto; padding: 24px; }
        .card { background: white; border-radius: 28px; padding: 32px; margin-bottom: 32px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        h2 { font-size: 1.5rem; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; margin: 20px 0; }
        .field { background: #faf8f5; padding: 16px; border-radius: 20px; text-align: center; }
        .field label { display: block; font-size: 0.8rem; color: #999; margin-bottom: 8px; }
        .field input { width: 100%; padding: 12px; border: 1px solid #e0d6c8; border-radius: 40px; text-align: center; font-size: 1rem; }
        .goal-group { display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0; }
        .goal-btn { background: #f0ede8; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; }
        .goal-btn.active { background: #1a1a2e; color: white; }
        .btn { background: #1a1a2e; color: white; padding: 12px 28px; border: none; border-radius: 40px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; margin-top: 10px; }
        .btn-outline { background: transparent; border: 1.5px solid #1a1a2e; color: #1a1a2e; padding: 10px 24px; border-radius: 40px; cursor: pointer; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; margin: 24px 0; }
        .menu-card { background: #faf8f5; border-radius: 24px; padding: 20px; cursor: pointer; border: 2px solid transparent; }
        .menu-card.selected { border-color: #4a7c59; background: #f0f5f0; }
        .menu-card h4 { margin-bottom: 8px; }
        .menu-desc { font-size: 0.8rem; color: #c4a87c; margin-bottom: 16px; }
        .meal-preview p { font-size: 0.85rem; color: #666; margin: 6px 0; }
        .meal-detail { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin: 20px 0; }
        .meal-item { background: white; padding: 16px; border-radius: 20px; }
        .recipe-link { margin-top: 10px; font-size: 0.8rem; color: #c4a87c; display: inline-block; text-decoration: none; }
        .back-link { display: inline-block; margin-bottom: 24px; color: #1a1a2e; text-decoration: none; font-weight: 500; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #faf8f5; }
        .hidden { display: none; }
        .info-text { background: #e8f0e8; padding: 16px; border-radius: 20px; margin-top: 16px; font-size: 0.9rem; }
        @media (max-width: 600px) { .container { margin: 20px auto; padding: 16px; } .card { padding: 24px; } }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>

    <!-- Параметры (полные замеры) -->
    <div class="card">
        <h2>📏 Мои параметры</h2>
        <div class="grid">
            <div class="field"><label>Вес (кг) *</label><input type="number" id="weight" step="0.1" placeholder="55.5" value="60"></div>
            <div class="field"><label>Рост (см) *</label><input type="number" id="height" step="1" placeholder="165" value="165"></div>
            <div class="field"><label>Возраст *</label><input type="number" id="age" step="1" placeholder="30" value="30"></div>
            <div class="field"><label>Обхват под грудью (см)</label><input type="number" id="chest" step="0.5" placeholder="75"></div>
            <div class="field"><label>Обхват талии (см)</label><input type="number" id="waist" step="0.5" placeholder="68"></div>
            <div class="field"><label>Обхват бёдер (см)</label><input type="number" id="hips" step="0.5" placeholder="92"></div>
        </div>
        <div class="goal-group">
            <button class="goal-btn" data-goal="loss">🔥 Похудение</button>
            <button class="goal-btn active" data-goal="maintain">⚖️ Поддержание</button>
            <button class="goal-btn" data-goal="gain">💪 Набор массы</button>
        </div>
        <button id="saveParamsBtn" class="btn"><i class="fas fa-save"></i> Сохранить параметры</button>
        <div id="calorieDisplay" class="info-text hidden"></div>
    </div>

    <!-- Календарь цикла -->
    <div class="card">
        <h2>🌸 Женский цикл</h2>
        <div class="grid">
            <div class="field"><label>📅 Первый день последних месячных</label><input type="date" id="lastPeriod"></div>
            <div class="field"><label>⏱️ Средняя длина цикла (дней)</label><input type="number" id="cycleLength" value="28" min="21" max="35"></div>
            <div class="field"><label>🤰 Беременность</label><select id="pregnant"><option value="no">Нет</option><option value="yes">Да</option></select></div>
        </div>
        <button id="saveCycleBtn" class="btn"><i class="fas fa-chart-line"></i> Сохранить данные цикла</button>
        <div id="cycleDisplay" class="info-text hidden"></div>
    </div>

    <!-- Ферритин -->
    <div class="card">

        <div class="field"><label>Ферритин (нг/мл):</label><input type="number" id="ferritin" step="1" placeholder="например, 25" value="25"></div>
        <button id="saveFerritinBtn" class="btn"><i class="fas fa-database"></i> Сохранить ферритин</button>
    </div>

    <!-- Меню (4 варианта) -->
    <div class="card" id="menuBlock">

        <div id="menuInfo" class="info-text"></div>
        <div id="menuOptions" class="menu-grid"></div>

            <h3>✅ Вы выбрали меню:</h3>
            <div id="selectedMenuDetails"></div>
            <button id="saveMenuBtn" class="btn"><i class="fas fa-heart"></i> Сохранить в мою кулинарную книгу</button>
        </div>
    </div>

    <!-- История замеров -->
    <div class="card">
        <h2>📊 История замеров</h2>
        <div id="historyTable"></div>
    </div>

    <!-- Напоминания -->

        <button id="notifyBtn" class="btn-outline"><i class="fas fa-bell"></i> Включить уведомления</button>
    </div>
</div>

    let currentGoal = "maintain";
    let selectedMenu = null;

    function getFerritinStatus(val) { if (!val && val!==0) return "normal"; if (val < 50) return "low"; if (val <= 150) return "normal"; return "high"; }
    function getTargetCalories(w,h,a,g) { let bmr = 10*w + 6.25*h - 5*a - 161; let tdee = bmr * 1.375; if (g==="loss") return Math.round(tdee*0.85); if (g==="gain") return Math.round(tdee*1.1); return Math.round(tdee); }
    function findNearestRange(cal) { let ranges = [1200,1350,1450,1550,1650,1750,1850,1950]; return ranges.reduce((a,b) => Math.abs(b-cal) < Math.abs(a-cal) ? b : a); }
    function getRangeName(cal) { let names = {1200:"1200-1300",1350:"1300-1400",1450:"1400-1500",1550:"1500-1600",1650:"1600-1700",1750:"1700-1800",1850:"1800-1900",1950:"1900-2000"}; return names[cal] || "1500-1600"; }

    function getCyclePhase() {
        let lastPeriod = document.getElementById('lastPeriod').value;
        let cycleLen = parseInt(document.getElementById('cycleLength').value) || 28;
        if (!lastPeriod) return null;
        let start = new Date(lastPeriod);
        let today = new Date();
        let daysDiff = Math.floor((today - start) / (1000*3600*24));
        let dayInCycle = (daysDiff % cycleLen) + 1;
        let ovulationDay = Math.floor(cycleLen/2);
        if (dayInCycle <= 7) return "menstrual";
        if (dayInCycle <= ovulationDay-2) return "follicular";
        if (dayInCycle <= ovulationDay+2) return "ovulatory";
        return "luteal";
    }

    function updateCalorieDisplay() {
        let w = parseFloat(document.getElementById('weight').value);
        let h = parseFloat(document.getElementById('height').value);
        let a = parseFloat(document.getElementById('age').value);
        if (w && h && a) {
            let cal = getTargetCalories(w,h,a,currentGoal);
            document.getElementById('calorieDisplay').innerHTML = `Ваша норма: ${cal} ккал/день (${currentGoal === "loss" ? "дефицит" : (currentGoal === "gain" ? "профицит" : "поддержание")})`;
            document.getElementById('calorieDisplay').classList.remove('hidden');
        }
    }

    function updateCycleDisplay() {
        let lastPeriod = document.getElementById('lastPeriod').value;
        let cycleLen = parseInt(document.getElementById('cycleLength').value) || 28;
        let pregnant = document.getElementById('pregnant').value;
        if (pregnant === "yes") {
            document.getElementById('cycleDisplay').innerHTML = "🤰 Беременность — питание подбирается индивидуально. Рекомендуем консультацию с врачом.";
            document.getElementById('cycleDisplay').classList.remove('hidden');
            return;
        }
        if (!lastPeriod) {
            document.getElementById('cycleDisplay').innerHTML = "📅 Заполните дату начала последних месячных";
            document.getElementById('cycleDisplay').classList.remove('hidden');
            return;
        }
        let start = new Date(lastPeriod);
        let today = new Date();
        let daysDiff = Math.floor((today - start) / (1000*3600*24));
        let dayInCycle = (daysDiff % cycleLen) + 1;
        let ovulationDay = Math.floor(cycleLen/2);
        let phase = "";
        if (dayInCycle <= 7) phase = "🩸 Менструация";
        else if (dayInCycle <= ovulationDay-2) phase = "🌱 Фолликулярная фаза";
        else if (dayInCycle <= ovulationDay+2) phase = "🥚 Овуляция";
        else phase = "🍂 Лютеиновая фаза";
        document.getElementById('cycleDisplay').innerHTML = `📅 День цикла: ${dayInCycle} — ${phase}`;
        document.getElementById('cycleDisplay').classList.remove('hidden');
    }

    function saveParams() {
        let w = document.getElementById('weight').value;
        let h = document.getElementById('height').value;
        let a = document.getElementById('age').value;
        if (!w || !h || !a) { alert("Заполните вес, рост и возраст (обязательно)"); return; }
        
        let params = { weight: w, height: h, age: a, chest: document.getElementById('chest').value, waist: document.getElementById('waist').value, hips: document.getElementById('hips').value, goal: currentGoal, date: new Date().toISOString() };
        localStorage.setItem('user_params', JSON.stringify(params));
        
        let history = JSON.parse(localStorage.getItem('user_measurements') || '[]');
        history.push({ date: new Date().toISOString(), weight: w, height: h, age: a, chest: document.getElementById('chest').value, waist: document.getElementById('waist').value, hips: document.getElementById('hips').value, goal: currentGoal });
        localStorage.setItem('user_measurements', JSON.stringify(history));
        
        renderHistory();
        updateCalorieDisplay();
        renderMenus();
        alert("Параметры сохранены");
    }

    function saveCycleData() {
        let lastPeriod = document.getElementById('lastPeriod').value;
        let cycleLength = document.getElementById('cycleLength').value;
        let pregnant = document.getElementById('pregnant').value;
        if (lastPeriod) localStorage.setItem('user_last_period', lastPeriod);
        localStorage.setItem('user_cycle_length', cycleLength);
        localStorage.setItem('user_pregnant', pregnant);
        updateCycleDisplay();
        renderMenus();
        alert("Данные цикла сохранены");
    }

    function loadSavedData() {
        let savedParams = localStorage.getItem('user_params');
        if (savedParams) {
            let p = JSON.parse(savedParams);
            document.getElementById('weight').value = p.weight;
            document.getElementById('height').value = p.height;
            document.getElementById('age').value = p.age;
            if (p.chest) document.getElementById('chest').value = p.chest;
            if (p.waist) document.getElementById('waist').value = p.waist;
            if (p.hips) document.getElementById('hips').value = p.hips;
            currentGoal = p.goal || "maintain";
            document.querySelectorAll('.goal-btn').forEach(btn => { if (btn.dataset.goal === currentGoal) btn.classList.add('active'); else btn.classList.remove('active'); });
            updateCalorieDisplay();
        }
        let savedLastPeriod = localStorage.getItem('user_last_period');
        let savedCycleLength = localStorage.getItem('user_cycle_length');
        let savedPregnant = localStorage.getItem('user_pregnant');
        if (savedLastPeriod) document.getElementById('lastPeriod').value = savedLastPeriod;
        if (savedCycleLength) document.getElementById('cycleLength').value = savedCycleLength;
        if (savedPregnant) document.getElementById('pregnant').value = savedPregnant;
        updateCycleDisplay();
    }

    function renderMenus() {
        let w = parseFloat(document.getElementById('weight').value);
        let h = parseFloat(document.getElementById('height').value);
        let a = parseFloat(document.getElementById('age').value);
        if (!w || !h || !a) { document.getElementById('menuInfo').innerHTML = "⚠️ Сначала заполните вес, рост и возраст"; return; }
        
        let pregnant = document.getElementById('pregnant').value;
        if (pregnant === "yes") { document.getElementById('menuInfo').innerHTML = "🤰 При беременности рекомендуем индивидуальную консультацию. Общие меню не подходят."; document.getElementById('menuOptions').innerHTML = ""; return; }
        
        let cal = getTargetCalories(w, h, a, currentGoal);
        let range = findNearestRange(cal);
        let ferVal = document.getElementById('ferritin').value ? parseFloat(document.getElementById('ferritin').value) : null;
        let ferStatus = getFerritinStatus(ferVal);
        let phase = getCyclePhase();
        
        let menus = (ferStatus === "low" && MENUS.low[range]) ? MENUS.low[range] : MENUS.normal[1550];
        let rangeName = getRangeName(range);
        let phaseText = "";
        if (phase === "menstrual") phaseText = "🩸 Менструация — нужны продукты, богатые железом";
        else if (phase === "follicular") phaseText = "🌱 Фолликулярная фаза — больше энергии и белка";
        else if (phase === "ovulatory") phaseText = "🥚 Овуляция — поддерживаем гормоны";
        else if (phase === "luteal") phaseText = "🍂 Лютеиновая фаза — меньше сладкого, больше магния";
        
        document.getElementById('menuInfo').innerHTML = `${rangeName} ккал · ферритин: ${ferStatus === "low" ? "низкий (меню с высоким содержанием железа)" : "норма"} · цель: ${currentGoal === "loss" ? "похудение" : (currentGoal === "gain" ? "набор" : "поддержание")}<br>${phaseText}`;
        
        let container = document.getElementById('menuOptions');
        container.innerHTML = menus.map((m, idx) => `
            <div class="menu-card" data-idx="${idx}">
                <h4>🍽️ ${m.title}</h4>
                <div class="menu-desc">${m.desc}</div>
                <div class="meal-preview">
                    <p>🌅 ${m.breakfast.substring(0, 50)}…</p>
                    <p>☀️ ${m.lunch.substring(0, 50)}…</p>
                    <p>🌙 ${m.dinner.substring(0, 50)}…</p>
                </div>
            </div>
        `).join('');
        
        window.currentMenus = menus;
        document.querySelectorAll('.menu-card').forEach(card => {
            card.onclick = () => {
                document.querySelectorAll('.menu-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                let idx = parseInt(card.dataset.idx);
                selectedMenu = window.currentMenus[idx];
                displaySelectedMenu(selectedMenu);
            };
        });
    }

    function displaySelectedMenu(menu) {
        document.getElementById('selectedMenuDetails').innerHTML = `
            <div class="meal-detail">
                <div class="meal-item"><h5>🌅 Завтрак</h5><p>${menu.breakfast}</p><a class="recipe-link" href="https://eda.ru/recepty?q=${encodeURIComponent(menu.breakfast.split('+')[0])}" target="_blank">Найти рецепт →</a></div>
                <div class="meal-item"><h5>☀️ Обед</h5><p>${menu.lunch}</p><a class="recipe-link" href="https://eda.ru/recepty?q=${encodeURIComponent(menu.lunch.split('+')[0])}" target="_blank">Найти рецепт →</a></div>
                <div class="meal-item"><h5>🌙 Ужин</h5><p>${menu.dinner}</p><a class="recipe-link" href="https://eda.ru/recepty?q=${encodeURIComponent(menu.dinner.split('+')[0])}" target="_blank">Найти рецепт →</a></div>
                <div class="meal-item"><h5>🍎 Перекус</h5><p>${menu.snack}</p><a class="recipe-link" href="https://eda.ru/recepty?q=${encodeURIComponent(menu.snack.split(',')[0])}" target="_blank">Найти рецепт →</a></div>
            </div>
        `;
        document.getElementById('selectedMenuBlock').classList.remove('hidden');
    }

    function saveMenuToLocal() {
        if (!selectedMenu) { alert("Сначала выберите меню"); return; }
        let saved = JSON.parse(localStorage.getItem('saved_menus') || '[]');
        if (saved.some(m => m.id === selectedMenu.id)) { alert("Меню уже сохранено"); return; }
        saved.push({ ...selectedMenu, savedAt: new Date().toISOString() });
        localStorage.setItem('saved_menus', JSON.stringify(saved));
        alert("Меню сохранено в кулинарную книгу!");
    }

    function renderHistory() {
        let history = JSON.parse(localStorage.getItem('user_measurements') || '[]');
        let container = document.getElementById('historyTable');
        if (history.length === 0) { container.innerHTML = "<p>Нет сохранённых замеров</p>"; return; }
        let html = '<table><thead><tr><th>Дата</th><th>Вес</th><th>Рост</th><th>Возраст</th><th>Грудь</th><th>Талия</th><th>Бёдра</th><th>Цель</th></tr></thead><tbody>';
        history.slice().reverse().forEach(h => {
            html += `<tr><td>${new Date(h.date).toLocaleDateString()}</td><td>${h.weight || "-"} кг</td><td>${h.height || "-"} см</td><td>${h.age || "-"}</td><td>${h.chest || "-"}</td><td>${h.waist || "-"}</td><td>${h.hips || "-"}</td><td>${h.goal === "loss" ? "похудение" : (h.goal === "gain" ? "набор" : "поддержание")}</td></tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function init() {
        document.getElementById('saveParamsBtn').onclick = saveParams;
        document.getElementById('saveFerritinBtn').onclick = () => renderMenus();
        document.getElementById('saveCycleBtn').onclick = saveCycleData;
        document.getElementById('saveMenuBtn').onclick = saveMenuToLocal;
        document.getElementById('notifyBtn').onclick = () => { if (Notification.permission !== 'granted') Notification.requestPermission().then(p => { if (p === 'granted') alert("Уведомления включены"); }); else alert("Уведомления уже разрешены"); };
        document.querySelectorAll('.goal-btn').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.goal-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentGoal = btn.dataset.goal; updateCalorieDisplay(); renderMenus(); }; });
        loadSavedData();
        renderHistory();
        if (document.getElementById('weight').value && document.getElementById('height').value && document.getElementById('age').value) renderMenus();
    }
    init();
</script>
</body>
</html>
