<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Админка | Валерия Радкова</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #faf8f5; color: #1a1a2e; padding: 40px 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: white; border-radius: 28px; padding: 32px; margin-bottom: 32px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        h1 { margin-bottom: 24px; }
        input, textarea { width: 100%; padding: 14px; margin-bottom: 16px; border: 1px solid #e0d6c8; border-radius: 20px; font-family: 'Inter', sans-serif; font-size: 1rem; }
        textarea { resize: vertical; }
        button { background: #1a1a2e; color: white; border: none; padding: 14px 28px; border-radius: 40px; cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: #faf8f5; padding: 20px; border-radius: 20px; text-align: center; }
        .stat-number { font-size: 2.5rem; font-weight: 700; }
        .post-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #eee; flex-wrap: wrap; gap: 12px; }
        .delete-btn { background: #c44; padding: 8px 16px; font-size: 0.8rem; }
        .back-link { display: inline-block; margin-bottom: 24px; color: #1a1a2e; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>
        <h1>📝 Админ-панель</h1>
        
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="total-posts">0</div><div>Всего статей</div></div>
            <div class="stat-card"><div class="stat-number" id="total-views">0</div><div>Всего просмотров</div></div>
        </div>

        <div class="card">
            <h2>➕ Новая статья</h2>
            <form id="post-form">
                <input type="text" id="title_ru" placeholder="Заголовок (РУС)" required>
                <input type="text" id="title_es" placeholder="Título (ESP)" required>
                <textarea id="excerpt_ru" placeholder="Краткое описание (РУС) - 1-2 предложения" rows="2"></textarea>
                <textarea id="excerpt_es" placeholder="Descripción breve (ESP)" rows="2"></textarea>
                <textarea id="content_ru" placeholder="Полный текст статьи (РУС)" rows="10" required></textarea>
                <textarea id="content_es" placeholder="Texto completo del artículo (ESP)" rows="10" required></textarea>
                <button type="submit"><i class="fas fa-publish"></i> Опубликовать</button>
            </form>
        </div>

        <div class="card">
            <h2>📄 Мои статьи</h2>
            <div id="admin-posts-list"></div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'valeriya2025';
        
        (function() {
            const pwd = prompt('Введите пароль администратора:');
            if (pwd !== ADMIN_PASSWORD) {
                alert('Неверный пароль');
                window.location.href = 'index.html';
            }
        })();

        function getBlogPosts() {
            const posts = localStorage.getItem('blog_posts');
            return posts ? JSON.parse(posts) : [];
        }

        function saveBlogPosts(posts) {
            localStorage.setItem('blog_posts', JSON.stringify(posts));
        }

        function updateStats() {
            const posts = getBlogPosts();
            const totalViews = posts.reduce((sum, p) => sum + (p.views || 0), 0);
            document.getElementById('total-posts').innerText = posts.length;
            document.getElementById('total-views').innerText = totalViews;
        }

        function renderPosts() {
            const container = document.getElementById('admin-posts-list');
            const posts = getBlogPosts();
            if (posts.length === 0) {
                container.innerHTML = '<p>Нет статей. Создайте первую!</p>';
                return;
            }
            container.innerHTML = posts.map(post => `
                <div class="post-item">
                    <div><strong>${post.title_ru || post.title}</strong><br><small>${new Date(post.date).toLocaleDateString()} | 👁️ ${post.views || 0}</small></div>
                    <button class="delete-btn" onclick="deletePost(${post.id})">Удалить</button>
                </div>
            `).join('');
        }

        window.deletePost = function(id) {
            if (confirm('Удалить статью?')) {
                const posts = getBlogPosts();
                const filtered = posts.filter(p => p.id != id);
                saveBlogPosts(filtered);
                renderPosts();
                updateStats();
                alert('Статья удалена');
            }
        };

        document.getElementById('post-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const posts = getBlogPosts();
            const newPost = {
                id: Date.now(),
                title_ru: document.getElementById('title_ru').value,
                title_es: document.getElementById('title_es').value,
                excerpt_ru: document.getElementById('excerpt_ru').value,
                excerpt_es: document.getElementById('excerpt_es').value,
                content_ru: document.getElementById('content_ru').value,
                content_es: document.getElementById('content_es').value,
                date: new Date().toISOString(),
                views: 0
            };
            posts.unshift(newPost);
            saveBlogPosts(posts);
            alert('Статья добавлена!');
            e.target.reset();
            renderPosts();
            updateStats();
        });

        renderPosts();
        updateStats();
    </script>
</body>
</html>
